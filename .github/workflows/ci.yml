name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore HelloApi.Tests/HelloApi.Tests.csproj
    
    - name: Build and Test
      run: dotnet build HelloApi.Tests/HelloApi.Tests.csproj --no-restore --configuration Release
    
    - name: Run tests
      run: dotnet test HelloApi.Tests/HelloApi.Tests.csproj --no-build --verbosity normal --configuration Release
